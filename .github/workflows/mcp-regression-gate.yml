name: MCP Tool Regression Gate
on: [push, pull_request]

jobs:
  tool-schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AlgoChains MCP + MCPorter
        run: |
          pip install -e ".[dev]"
          npm install -g mcporter

      - name: Configure MCPorter
        run: |
          mkdir -p config
          cat > config/mcporter.json << 'EOF'
          {
            "mcpServers": {
              "algochains": {
                "command": "algochains-mcp",
                "env": {
                  "ALGOCHAINS_TOOL_MODE": "full"
                }
              }
            }
          }
          EOF

      # Gate 1: Tool count must not decrease.
      # Floor is conservatively below the current README badge (468) to allow
      # small non-regression deltas; bump both together when we intentionally
      # add or remove tool families.
      - name: "Gate 1: Tool Count (≥450)"
        run: |
          TOOLS=$(npx mcporter list algochains --json | jq '.tools | length')
          echo "Tool count: $TOOLS"
          [ "$TOOLS" -ge 450 ] || (echo "❌ FAIL: Expected ≥450 tools, got $TOOLS" && exit 1)
          echo "✅ Tool count: $TOOLS"

      # Gate 2: All Tier 1 tools must be present in smart mode
      - name: "Gate 2: Tier 1 Tools Present"
        env:
          ALGOCHAINS_TOOL_MODE: smart
        run: |
          TIER1_EXPECTED="discover_tools get_tool_details execute_dynamic_tool massive_search_endpoints massive_call_api massive_query_data massive_run_pipeline place_order cancel_order close_position get_positions get_account portfolio_summary connect_broker run_backtest validate_strategy optimize_strategy deploy_strategy browse_strategy_marketplace execute_intent approve_intent create_shadow_portfolio detect_market_regime"
          TOOLS_JSON=$(npx mcporter list algochains --json)
          for tool in $TIER1_EXPECTED; do
            echo "$TOOLS_JSON" | jq -e ".tools[] | select(.name == \"$tool\")" > /dev/null 2>&1 \
              || (echo "❌ Missing Tier 1 tool: $tool" && exit 1)
          done
          echo "✅ All Tier 1 tools present (including V18 intent tools)"

      # Gate 3: BM25 Smart Discovery returns relevant results (Python direct test — no mcporter call needed)
      - name: "Gate 3: Smart Discovery BM25"
        run: |
          python3 - << 'PYEOF'
          import sys
          sys.path.insert(0, 'src')
          from algochains_mcp.dynamic_toolsets.gateway import DynamicToolsetGateway
          from algochains_mcp.server import TOOLS

          gw = DynamicToolsetGateway()
          gw.register_tools_from_list(
              [{"name": t.name, "description": t.description, "inputSchema": t.inputSchema}
               for t in TOOLS],
              category="core", version="v20"
          )
          gw.build_index()

          # Test 1: sentiment query
          results = gw.discover("sentiment analysis", top_k=10)
          sentiment_hits = [r for r in results if "sentiment" in r["name"].lower()]
          assert sentiment_hits, f"BM25 'sentiment analysis' returned no sentiment tools. Got: {[r['name'] for r in results]}"
          print(f"✅ BM25 sentiment: {[r['name'] for r in sentiment_hits]}")

          # Test 2: portfolio query
          results = gw.discover("portfolio positions", top_k=10)
          portfolio_hits = [r for r in results if "portfolio" in r["name"].lower() or "position" in r["name"].lower()]
          assert portfolio_hits, f"BM25 'portfolio positions' returned no portfolio/position tools. Got: {[r['name'] for r in results]}"
          print(f"✅ BM25 portfolio: {[r['name'] for r in portfolio_hits]}")

          print("✅ BM25 index returning relevant results")
          PYEOF

      # Gate 4: V18 Intent Engine tools present and callable
      - name: "Gate 4: V18 Intent Engine Tools"
        run: |
          V18_TOOLS="execute_intent get_intent_plan approve_intent get_intent_history create_shadow_portfolio get_shadow_results evolve_strategies detect_arbitrage detect_market_regime prefetch_context"
          TOOLS_JSON=$(npx mcporter list algochains --json)
          COUNT=0
          for tool in $V18_TOOLS; do
            if echo "$TOOLS_JSON" | jq -e ".tools[] | select(.name == \"$tool\")" > /dev/null 2>&1; then
              COUNT=$((COUNT + 1))
            else
              echo "❌ Missing V18 tool: $tool"
              exit 1
            fi
          done
          echo "✅ All $COUNT V18 Intent Engine + Genius Layer tools present"

      # Gate 5: detect_market_regime returns valid regime output (Python direct test)
      - name: "Gate 5: V18 Smoke Test"
        run: |
          python3 - << 'PYEOF'
          import sys, asyncio
          sys.path.insert(0, 'src')
          from algochains_mcp.intent_engine.regime_detector import RegimeDetector, RegimeSignals

          async def run():
              eng = RegimeDetector()
              result = await eng.detect(RegimeSignals())
              data = result.to_dict()
              assert "regime" in data, f"detect_market_regime missing 'regime' key: {data}"
              print(f"✅ V18 detect_market_regime returns valid regime: {data['regime']}")

          asyncio.run(run())
          PYEOF

      # Gate 6: Python AST parse (no syntax errors in server.py)
      - name: "Gate 6: Python AST Validation"
        run: |
          python3 -c "
          import ast
          with open('src/algochains_mcp/server.py') as f:
              tree = ast.parse(f.read())
          print('✅ server.py AST parse OK')
          "
          python3 -c "
          import ast, glob
          for f in glob.glob('src/algochains_mcp/intent_engine/*.py'):
              with open(f) as fh:
                  ast.parse(fh.read())
              print(f'✅ {f} OK')
          "

      # Gate 7: Massive white-label provider imports cleanly and the 4 composable
      # tool methods are addressable. When a MASSIVE_API_KEY is available in CI
      # (encrypted secret), build the BM25 index and run a read-only search so we
      # catch upstream `llms.txt` drift before it hits the Tyler account.
      - name: "Gate 7: Massive Provider Import + Optional Mocked API"
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import asyncio
          import os
          import sys
          sys.path.insert(0, 'src')

          from algochains_mcp.data_providers.massive_whitelabel import (
              MassiveWhiteLabelProvider,
          )
          from algochains_mcp.config import MassiveConfig

          required = {"search_endpoints", "get_endpoint_docs", "call_api", "query_data", "startup"}
          missing = [m for m in required if not hasattr(MassiveWhiteLabelProvider, m)]
          assert not missing, f"MassiveWhiteLabelProvider missing methods: {missing}"
          print(f"✅ Massive provider exposes composable tool surface: {sorted(required)}")

          if not os.environ.get("MASSIVE_API_KEY"):
              print("ℹ️  MASSIVE_API_KEY absent in this CI context — skipping live BM25 smoke")
              sys.exit(0)

          async def _smoke():
              cfg = MassiveConfig(api_key=os.environ["MASSIVE_API_KEY"])
              prov = MassiveWhiteLabelProvider(cfg)
              await prov.startup()
              hits = prov.search_endpoints(query="aggregates", top_k=3)
              assert isinstance(hits, list) and hits, f"search_endpoints returned nothing: {hits!r}"
              print(f"✅ Massive BM25 returned {len(hits)} hits (top: {hits[0].get('path', '?')})")

          asyncio.run(_smoke())
          PYEOF

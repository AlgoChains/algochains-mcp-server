name: Release CLI + SDK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AlgoChains MCP + MCPorter
        run: |
          pip install -e ".[dev]"
          npm install -g mcporter

      - name: Generate CLI bundle
        run: |
          npx mcporter generate-cli --server algochains --bundle dist/algochains-cli.js
          echo "CLI_SIZE=$(wc -c < dist/algochains-cli.js)" >> $GITHUB_ENV

      - name: Generate TypeScript SDK
        run: |
          npx mcporter emit-ts algochains --mode types --out packages/sdk/src/types.d.ts
          npx mcporter emit-ts algochains --mode client --out packages/sdk/src/client.d.ts
          echo "SDK_LINES=$(wc -l < packages/sdk/src/types.d.ts)" >> $GITHUB_ENV

      - name: Verify tool count
        run: |
          TOOLS=$(npx mcporter list algochains --json | jq '.tools | length')
          echo "TOOL_COUNT=$TOOLS" >> $GITHUB_ENV
          # Floor aligned with mcp-regression-gate.yml and the README badge (468 current).
          [ "$TOOLS" -ge 450 ] || (echo "Tool count regression: $TOOLS < 450" && exit 1)

      - name: Verify pyproject version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          PYVER=$(grep -E '^version\s*=' pyproject.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$PYVER" != "$VER" ]; then
            echo "pyproject version ($PYVER) does not match tag ($VER). Bump pyproject.toml before tagging."
            exit 1
          fi
          echo "✅ tag=$TAG matches pyproject version=$PYVER"

      - name: Create release artifacts
        run: |
          mkdir -p release
          cp dist/algochains-cli.js release/
          tar -czf release/algochains-sdk-${{ github.ref_name }}.tar.gz -C packages/sdk .
          cp scripts/algochains release/algochains-wrapper.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/algochains-cli.js
            release/algochains-sdk-${{ github.ref_name }}.tar.gz
            release/algochains-wrapper.sh
          body: |
            ## AlgoChains ${{ github.ref_name }}

            **Tools:** ${{ env.TOOL_COUNT }}
            **CLI Bundle:** ${{ env.CLI_SIZE }} bytes
            **SDK Types:** ${{ env.SDK_LINES }} lines

            ### Versioning

            Tags follow [SemVer](https://semver.org/): `vMAJOR.MINOR.PATCH` (no pre-release suffix here). The tag version must match `pyproject.toml::version` and the README "Version" badge — the CI gate in `Verify pyproject version matches tag` enforces this and will fail the release if they drift.

            Companion `CHANGELOG.md` entry must exist under a heading matching the tag's version (e.g. `[22.1.0]` for tag `v22.1.0`).

            ### NPM publish prerequisites

            The `publish-sdk` job pushes `@algochains/sdk` to npmjs.org as `--access public`. Requirements:
            - `NPM_TOKEN` secret on this repo with **Automation** scope + publish rights on `@algochains`
            - Node 22 resolves `registry.npmjs.org`
            - `packages/sdk/package.json::version` tracks the tag (script regenerates types/client each release)

            ### Quick Start
            ```bash
            # Download CLI
            curl -fsSL https://github.com/AlgoChains/algochains-mcp-server/releases/download/${{ github.ref_name }}/algochains-cli.js -o algochains-cli.js
            node algochains-cli.js discover-tools --query "portfolio"
            node algochains-cli.js detect-market-regime
            ```

  publish-sdk:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Publish @algochains/sdk
        working-directory: packages/sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

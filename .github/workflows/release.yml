name: Release CLI + SDK + PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Build: CLI bundle + SDK types ───────────────────────────────────────────
  build-cli:
    runs-on: ubuntu-latest
    outputs:
      cli_sha256: ${{ steps.sha.outputs.cli_sha256 }}
      tool_count: ${{ steps.toolcount.outputs.count }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AlgoChains MCP + MCPorter
        run: |
          pip install -e ".[dev]"
          npm install -g mcporter@0.12.0

      - name: Extract tag (strip leading v)
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "ver=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Verify pyproject version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          PYVER=$(grep -E '^version\s*=' pyproject.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$PYVER" != "$VER" ]; then
            echo "pyproject version ($PYVER) does not match tag ($VER). Bump pyproject.toml before tagging."
            exit 1
          fi
          echo "✅ tag=$TAG matches pyproject version=$PYVER"

      - name: Generate CLI bundle
        run: |
          npx mcporter generate-cli --server algochains --bundle dist/algochains-cli.js
          echo "CLI_SIZE=$(wc -c < dist/algochains-cli.js)" >> $GITHUB_ENV

      - name: Compute CLI SHA256
        id: sha
        run: |
          SHA=$(sha256sum dist/algochains-cli.js | cut -d' ' -f1)
          echo "cli_sha256=${SHA}" >> $GITHUB_OUTPUT
          echo "CLI_SHA256=${SHA}" >> $GITHUB_ENV
          echo "✅ CLI SHA256: $SHA"

      - name: Generate TypeScript SDK
        run: |
          npx mcporter emit-ts algochains --mode types --out packages/sdk/src/types.d.ts
          npx mcporter emit-ts algochains --mode client --out packages/sdk/src/client.d.ts
          echo "SDK_LINES=$(wc -l < packages/sdk/src/types.d.ts)" >> $GITHUB_ENV

      - name: Configure MCPorter for full-mode tool count
        run: |
          # mcporter reads config/mcporter.json and passes its env to the MCP server process,
          # overriding any shell-level ALGOCHAINS_TOOL_MODE env var. Patch the JSON directly.
          jq '.mcpServers.algochains.env.ALGOCHAINS_TOOL_MODE = "full"' config/mcporter.json \
            > /tmp/mcporter-full.json
          mv /tmp/mcporter-full.json config/mcporter.json
          echo "mcporter.json ALGOCHAINS_TOOL_MODE: $(jq -r '.mcpServers.algochains.env.ALGOCHAINS_TOOL_MODE' config/mcporter.json)"

      - name: Verify tool count
        id: toolcount
        run: |
          TOOLS=$(npx mcporter list algochains --json | jq '.tools | length')
          echo "count=${TOOLS}" >> $GITHUB_OUTPUT
          echo "TOOL_COUNT=$TOOLS" >> $GITHUB_ENV
          [ "$TOOLS" -ge 450 ] || (echo "Tool count regression: $TOOLS < 450" && exit 1)
          echo "✅ Tool count: $TOOLS"

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp dist/algochains-cli.js release/
          tar -czf release/algochains-sdk-${{ github.ref_name }}.tar.gz -C packages/sdk .
          cp scripts/algochains release/algochains-wrapper.sh
          cp scripts/algochains.ps1 release/algochains.ps1 2>/dev/null || true
          cp scripts/install.sh release/install.sh 2>/dev/null || true

      - name: Upload CLI artifact (shared with binary + PyPI jobs)
        uses: actions/upload-artifact@v4
        with:
          name: cli-bundle
          path: dist/algochains-cli.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/algochains-cli.js
            release/algochains-sdk-${{ github.ref_name }}.tar.gz
            release/algochains-wrapper.sh
            release/algochains.ps1
            release/install.sh
          body: |
            ## AlgoChains ${{ github.ref_name }}

            **Tools:** ${{ env.TOOL_COUNT }}
            **CLI Bundle:** ${{ env.CLI_SIZE }} bytes
            **SDK Types:** ${{ env.SDK_LINES }} lines
            **SHA256:** `${{ env.CLI_SHA256 }}`

            ### Install

            **macOS (Homebrew)**
            ```bash
            brew tap algochains/algochains
            brew install algochains
            ```

            **Linux / macOS (standalone binary)**
            ```bash
            # macOS arm64
            curl -fsSL https://github.com/AlgoChains/algochains-mcp-server/releases/download/${{ github.ref_name }}/algochains-darwin-arm64 -o algochains && chmod +x algochains

            # Linux x64
            curl -fsSL https://github.com/AlgoChains/algochains-mcp-server/releases/download/${{ github.ref_name }}/algochains-linux-x64 -o algochains && chmod +x algochains
            ```

            **Universal installer**
            ```bash
            curl -fsSL https://algochains.ai/install.sh | sh
            ```

            **pip (MCP server — available after first CI publish)**
            ```bash
            pip install algochains-mcp-server
            # Or install from source (GitHub access required):
            # git clone https://github.com/AlgoChains/algochains-mcp-server && pip install -e ".[http,supabase,auth]"
            ```

            **npm (TypeScript SDK)**
            ```bash
            npm install @algochains/sdk
            ```

            ### Quick Start
            ```bash
            algochains doctor
            algochains detect-market-regime
            algochains discover-tools --query "portfolio"
            algochains            # launch interactive REPL
            ```

            ### Versioning
            Tags follow [SemVer](https://semver.org/). Tag version must match `pyproject.toml::version`.

  # ─── Standalone binaries via pkg ─────────────────────────────────────────────
  build-binaries:
    runs-on: ubuntu-latest
    needs: build-cli
    continue-on-error: true   # HK-7: pkg + mcporter ESM compatibility untested; rest of release continues on failure
    strategy:
      matrix:
        target:
          - { name: linux-x64,      pkg_target: node18-linux-x64,   output: algochains-linux-x64 }
          - { name: darwin-arm64,   pkg_target: node18-macos-arm64, output: algochains-darwin-arm64 }
          - { name: darwin-x64,     pkg_target: node18-macos-x64,   output: algochains-darwin-x64 }
          - { name: win-x64,        pkg_target: node18-win-x64,     output: algochains-win-x64.exe }
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli-bundle

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Build standalone binary (${{ matrix.target.name }})
        run: |
          # @vercel/pkg was unpublished from npm (404) — @yao-pkg/pkg is the
          # maintained fork with the same `pkg` CLI and node18 targets
          npm install -g @yao-pkg/pkg@6.20.0
          pkg algochains-cli.js \
            --target ${{ matrix.target.pkg_target }} \
            --output ${{ matrix.target.output }} \
            --compress GZip
          echo "Binary size: $(wc -c < ${{ matrix.target.output }}) bytes"

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.target.output }}

  # ─── PyPI: build Python wheel ─────────────────────────────────────────────────
  release-build-python:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python distributions
        run: |
          pip install build
          python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dists
          path: dist/*.tar.gz
          # Only upload source + wheel, not the CLI bundle
          if-no-files-found: error

  # ─── PyPI: OIDC publish (no stored token) ─────────────────────────────────────
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build-cli, release-build-python]
    environment:
      name: pypi
      url: https://pypi.org/p/algochains-mcp-server
    permissions:
      id-token: write   # mandatory for OIDC trusted publishing — keep on this job ONLY
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dists
          path: dist/

      - name: Publish to PyPI (OIDC — no API token needed)
        uses: pypa/gh-action-pypi-publish@release/v1

  # ─── npm: bump version + publish SDK ──────────────────────────────────────────
  publish-sdk:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AlgoChains MCP + MCPorter
        run: |
          pip install -e ".[dev]"
          npm install -g mcporter@0.12.0

      # mcporter resolves named servers from config/mcporter.json (cwd) or
      # ~/.mcporter/config.json (global) — without this, emit-ts fails with
      # "Unknown MCP server 'algochains'". Write both: the explicit regenerate
      # step runs from the repo root, but npm publish re-triggers regenerate
      # via prepublishOnly from packages/sdk, which needs the global config.
      - name: Configure MCPorter
        run: |
          mkdir -p config ~/.mcporter
          cat > config/mcporter.json << 'EOF'
          {
            "mcpServers": {
              "algochains": {
                "command": "algochains-mcp",
                "env": {
                  "ALGOCHAINS_TOOL_MODE": "full"
                }
              }
            }
          }
          EOF
          cp config/mcporter.json ~/.mcporter/config.json

      - name: Regenerate SDK types from live server schema
        run: |
          npx mcporter emit-ts algochains --mode types --out packages/sdk/src/types.d.ts
          npx mcporter emit-ts algochains --mode client --out packages/sdk/src/client.d.ts

      - name: Bump SDK version to match release tag
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          cd packages/sdk
          # Update version in package.json without creating a git tag
          npm version "${VER}" --no-git-tag-version --allow-same-version
          echo "✅ SDK version bumped to ${VER}"
          cat package.json | grep '"version"'

      - name: Publish @algochains/sdk
        working-directory: packages/sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Homebrew tap auto-update ─────────────────────────────────────────────────
  update-homebrew:
    runs-on: ubuntu-latest
    needs: build-cli
    continue-on-error: true   # HK-2: AlgoChains/homebrew-algochains tap repo may not exist yet
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the homebrew tap repo; requires HOMEBREW_TAP_TOKEN secret
          # pointing to a PAT with Contents write access on AlgoChains/homebrew-algochains
          repository: AlgoChains/homebrew-algochains
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula version + SHA256 from PyPI
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          PKG="algochains_mcp_server-${VER}"
          FORMULA="homebrew-tap/Formula/algochains.rb"

          # Fetch SHA256 and URL of the PyPI sdist (public, no auth required)
          PYPI_JSON=$(curl -sfL "https://pypi.org/pypi/algochains-mcp-server/${VER}/json")
          PYPI_URL=$(echo "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype=="sdist") | .url')
          PYPI_SHA=$(echo "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype=="sdist") | .digests.sha256')

          if [ -z "$PYPI_URL" ] || [ -z "$PYPI_SHA" ]; then
            echo "⚠️  PyPI metadata not yet available — skipping formula update"
            exit 0
          fi

          # Update version, PyPI url, and sha256 in the formula
          sed -i "s|version \"[^\"]*\"|version \"${VER}\"|g" "$FORMULA"
          sed -i "s|url \"https://files.pythonhosted.org/[^\"]*\"|url \"${PYPI_URL}\"|g" "$FORMULA"
          sed -i "s|sha256 \"[^\"]*\"|sha256 \"${PYPI_SHA}\"|g" "$FORMULA"

          echo "✅ Formula updated for ${VER}:"
          grep -E "version|url|sha256" "$FORMULA"

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "AlgoChains Bot"
          git config user.email "bot@algochains.ai"
          git add Formula/algochains.rb
          git diff --staged --quiet || git commit -m "chore: bump algochains to ${{ github.ref_name }}"
          git push

  # ─── Winget manifest auto-update ──────────────────────────────────────────────
  update-winget:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - name: Generate winget manifest
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          SHA="${{ needs.build-cli.outputs.cli_sha256 }}"

          mkdir -p manifests/a/AlgoChains/algochains/${VER}

          cat > manifests/a/AlgoChains/algochains/${VER}/AlgoChains.algochains.installer.yaml << EOF
          PackageIdentifier: AlgoChains.algochains
          PackageVersion: ${VER}
          Installers:
            - Architecture: x64
              InstallerType: portable
              InstallerUrl: https://github.com/AlgoChains/algochains-mcp-server/releases/download/${TAG}/algochains-win-x64.exe
              InstallerSha256: ${SHA}
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

          cat > manifests/a/AlgoChains/algochains/${VER}/AlgoChains.algochains.locale.en-US.yaml << EOF
          PackageIdentifier: AlgoChains.algochains
          PackageVersion: ${VER}
          PackageLocale: en-US
          Publisher: AlgoChains
          PublisherUrl: https://algochains.ai
          PackageName: AlgoChains CLI
          PackageUrl: https://github.com/AlgoChains/algochains-mcp-server
          ShortDescription: AI-native algorithmic trading CLI with 482 MCP tools
          License: MIT
          ManifestType: locale
          ManifestVersion: 1.6.0
          EOF

          cat > manifests/a/AlgoChains/algochains/${VER}/AlgoChains.algochains.yaml << EOF
          PackageIdentifier: AlgoChains.algochains
          PackageVersion: ${VER}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          echo "✅ Winget manifests generated for ${VER}"
          ls manifests/a/AlgoChains/algochains/${VER}/

      - name: Upload winget manifests as artifact
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests
          path: manifests/

name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Ruff — real errors only (syntax, undefined names, broken f-strings)
        # Scoped to the high-signal error set so the gate catches genuine bugs
        # (E9 syntax, F63/F7 logic, F82 undefined name) without failing the
        # build on pre-existing style across a 250+ file codebase.
        run: ruff check src/algochains_mcp/ --select E9,F63,F7,F82 --output-format=github

      - name: Ruff — full check (advisory, non-blocking)
        continue-on-error: true
        run: ruff check src/algochains_mcp/ --output-format=github

name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" --ignore-installed pyjwt

      - name: Run test suite
        # Exclude live broker tests (need real credentials) and the flagged
        # test_live_audit module. Keep the run hermetic.
        run: |
          pytest tests/ -q --tb=short \
            --ignore=tests/live \
            --ignore=tests/test_live_audit.py \
            -p no:cacheprovider
